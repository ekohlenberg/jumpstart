# <auto-generated> Rust port of common.csproj </auto-generated>
[package]
name = "common"
version = "0.1.0"
edition = "2021"
description = "Shared common library for jumptest (generated by Jumpstart)"

[lib]
name = "common"
path = "lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
rust_decimal = "1"
uuid = { version = "1", features = ["serde", "v4"] }
# Auth0 support (common::auth0): inbound JWT validation + outbound M2M
# client-credentials tokens, shared by the api/scheduler/scriptagent servers.
# 10.3+ fixes the RUSTSEC claim type-confusion (string exp/nbf can bypass
# time-based validation). The pure-Rust `rust_crypto` backend keeps RS256/HS256
# working without pulling in aws-lc-rs (needs a C/cmake toolchain), which is the
# v10 default.
jsonwebtoken = { version = "10.3", default-features = false, features = ["rust_crypto"] }
ureq = "2"
